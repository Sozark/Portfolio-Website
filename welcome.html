<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Welcome</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="css/normalize.css">
<link rel="stylesheet" href="css/main.css">
<style>
  .skip-link {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Courier New', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: rgba(0, 255, 0, 0.45);
    text-decoration: none;
    border-bottom: 1px solid rgba(0, 255, 0, 0.2);
    padding-bottom: 2px;
    transition: color 0.2s ease, border-color 0.2s ease;
    z-index: 100;
    white-space: nowrap;
  }
  .skip-link:hover {
    color: rgba(0, 255, 0, 0.9);
    border-color: rgba(0, 255, 0, 0.6);
  }
</style>
</head>
<body data-page="choice">

<!-- Cinematic vignette overlay -->
<div class="vignette"></div>

<!-- Flash effect on pill click -->
<div class="flash-overlay" id="flashOverlay"></div>

<div class="choice-container">
  <h1 class="choice-headline" id="choiceHeadline">Welcome.</h1>

  <!-- Pills -->
  <div class="pills-wrap">
    <button id="redPill"  class="pill red-pill"  title="Red pill"></button>
    <button id="bluePill" class="pill blue-pill" title="Blue pill"></button>
  </div>

  <!-- Subtext -->
  <p class="choice-subtext blinking" id="choiceSubtext">
    Take the <span class="red-text">red pill</span> — you stay in Wonderland.<br>
    Take the <span class="blue-text">blue pill</span> — the story ends.
  </p>
</div>

<!-- Skip link — subtle, always visible, bypasses the scene -->
<a href="portfolio.html" class="skip-link">// skip → enter portfolio</a>

<script src="js/main.js"></script>
</body>
</html>
