<style>
  .skip-link {
    position: fixed;
    bottom: 2.5rem;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Courier New', monospace;
    font-size: 0.9rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #0f0;
    text-decoration: none;
    padding: 0.7rem 1.5rem;
    border: 1px solid rgba(0, 255, 0, 0.6);
    border-radius: 4px;
    background: rgba(0, 255, 0, 0.05);
    z-index: 100;
    white-space: nowrap;
    transition: color 0.2s ease, background 0.2s ease, box-shadow 0.2s ease;
    animation: skipPulse 2.4s ease-in-out infinite;
  }
  .skip-link:hover {
    color: #000;
    background: #0f0;
    box-shadow: 0 0 22px rgba(0, 255, 0, 0.7);
    animation: none;
  }
  @keyframes skipPulse {
    0%, 100% { box-shadow: 0 0 8px rgba(0, 255, 0, 0.2); border-color: rgba(0, 255, 0, 0.45); }
    50%      { box-shadow: 0 0 18px rgba(0, 255, 0, 0.5); border-color: rgba(0, 255, 0, 0.85); }
  }
  @media (prefers-reduced-motion: reduce) {
    .skip-link { animation: none; }
  }
</style>
</head>
<body data-page="choice">
<!-- Cinematic vignette overlay -->
<div class="vignette"></div>
<!-- Flash effect on pill click -->
<div class="flash-overlay" id="flashOverlay"></div>

<div class="choice-container">
  <h1 class="choice-headline" id="choiceHeadline">Welcome.</h1>

  <div class="pills-wrap">
    <button id="redPill"  class="pill red-pill"  title="Red pill"></button>
    <button id="bluePill" class="pill blue-pill" title="Blue pill"></button>
  </div>

  <p class="choice-subtext blinking" id="choiceSubtext">
    Take the <span class="red-text">red pill</span> — you stay in Wonderland.<br>
    Take the <span class="blue-text">blue pill</span> — the story ends.
  </p>
</div>
